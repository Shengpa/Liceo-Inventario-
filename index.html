<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#8b0000"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Club Inventario</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --rojo:#8b0000;--rojo2:#a00000;--verde:#22c55e;--azul:#3b82f6;--naranja:#f97316;
    --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
    --txt:#f5f0e8;--txt2:#aaa;--txt3:#666;
    --border:#2a2a2a;
  }
  html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Crimson Text',Georgia,serif;overflow-x:hidden}
  
  /* HEADER */
  #header{
    position:sticky;top:0;z-index:100;
    background:linear-gradient(135deg,#111,#1a0505);
    border-bottom:3px solid var(--rojo);
    box-shadow:0 4px 30px rgba(139,0,0,0.4);
    padding:0 16px;
    display:flex;align-items:center;gap:12px;
  }
  #header .logo{width:42px;height:42px;background:var(--rojo);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 20px rgba(139,0,0,0.6)}
  #header .brand{flex:1}
  #header .brand-name{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase}
  #header .brand-sub{font-size:10px;color:var(--rojo);letter-spacing:4px;text-transform:uppercase}
  #nav{display:flex;gap:0}
  #nav button{
    padding:18px 14px;background:transparent;color:var(--txt3);border:none;cursor:pointer;
    font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .2s;white-space:nowrap;
  }
  #nav button.active{color:var(--txt);border-bottom-color:var(--rojo)}

  /* STATS */
  #stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;max-width:700px;margin:0 auto}
  .stat{
    background:linear-gradient(135deg,var(--bg3),var(--bg2));
    border:1px solid var(--border);border-radius:8px;padding:14px 12px;
  }
  .stat-icon{font-size:20px;margin-bottom:4px}
  .stat-val{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700}
  .stat-lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

  /* CONTENT */
  #content{max-width:700px;margin:0 auto;padding:0 16px 100px}

  /* FILTROS */
  #filtros{display:flex;gap:8px;margin-bottom:16px;padding-top:8px;flex-wrap:wrap}
  #filtros input,#filtros select{
    background:var(--bg3);border:1px solid var(--border);color:var(--txt);
    padding:10px 14px;border-radius:6px;font-family:inherit;font-size:14px;outline:none;flex:1;min-width:120px;
  }

  /* FAB */
  #fab{
    position:fixed;bottom:24px;right:24px;z-index:90;
    width:58px;height:58px;border-radius:50%;
    background:var(--rojo);color:var(--txt);border:none;
    font-size:28px;cursor:pointer;
    box-shadow:0 4px 24px rgba(139,0,0,0.6);
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s;
  }
  #fab:active{transform:scale(.92)}

  /* TABLA / CARDS */
  .producto-card{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:10px;margin-bottom:10px;overflow:hidden;
    transition:border-color .2s;
  }
  .producto-card:active{border-color:var(--rojo)}
  .card-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
  .card-nombre{font-family:'Oswald',sans-serif;font-size:17px;letter-spacing:1px;flex:1}
  .card-cat{font-size:11px;color:var(--txt3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
  .stock-badge{
    font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;
    min-width:42px;text-align:center;
  }
  .card-bottom{display:flex;gap:0;border-top:1px solid var(--border)}
  .card-bottom .precio{
    flex:1;padding:10px 16px;font-family:'Oswald',sans-serif;font-size:16px;
    color:var(--verde);display:flex;align-items:center;
  }
  .card-bottom .acc{display:flex;gap:0}
  .btn-vender,.btn-stock,.btn-del{
    padding:10px 16px;border:none;cursor:pointer;font-family:'Oswald',sans-serif;
    font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;transition:background .15s;
  }
  .btn-vender{background:var(--rojo);color:var(--txt);border-left:1px solid rgba(255,255,255,.08)}
  .btn-vender:disabled{background:var(--bg3);color:var(--txt3)}
  .btn-stock{background:#1e3a5f;color:var(--azul);border-left:1px solid rgba(255,255,255,.08)}
  .btn-del{background:var(--bg3);color:var(--txt3);border-left:1px solid rgba(255,255,255,.08);font-size:16px}
  .estado-pill{
    display:inline-block;padding:2px 8px;border-radius:20px;
    font-size:10px;letter-spacing:2px;font-weight:700;font-family:'Oswald',sans-serif;
    margin-left:8px;vertical-align:middle;
  }

  /* VENTAS */
  .venta-item{
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    padding:14px 16px;margin-bottom:8px;
    display:flex;align-items:center;gap:12px;
  }
  .venta-info{flex:1}
  .venta-nombre{font-family:'Oswald',sans-serif;font-size:16px}
  .venta-fecha{font-size:12px;color:var(--txt3);margin-top:2px}
  .venta-total{font-family:'Oswald',sans-serif;font-size:18px;color:var(--verde);font-weight:700}

  /* MODAL */
  #overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
    z-index:200;align-items:flex-end;justify-content:center;
    backdrop-filter:blur(4px);
  }
  #overlay.open{display:flex}
  #modal{
    background:linear-gradient(135deg,var(--bg3),var(--bg2));
    border:1px solid var(--border);border-top:3px solid var(--rojo);
    border-radius:16px 16px 0 0;padding:28px 20px 36px;
    width:100%;max-width:480px;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  #modal h2{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:6px}
  #modal .sub{color:var(--txt3);font-size:14px;margin-bottom:20px}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
  .modal-row:last-of-type{border:none}
  .modal-row span{color:var(--txt2);font-size:15px}
  .modal-row strong{font-family:'Oswald',sans-serif;font-size:16px}
  .modal-input-label{font-size:11px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;margin:16px 0 6px;display:block}
  .modal-input{
    width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--txt);
    padding:14px;border-radius:6px;font-family:'Oswald',sans-serif;font-size:24px;
    font-weight:700;outline:none;text-align:center;
  }
  .modal-total{
    background:#0a0a0a;padding:12px 16px;border-radius:6px;margin:14px 0 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .modal-total span{color:var(--txt2)}
  .modal-total strong{font-family:'Oswald',sans-serif;font-size:22px}
  .modal-btns{display:flex;gap:10px}
  .btn-cancel{
    flex:1;background:transparent;color:var(--txt3);border:1px solid var(--border);
    padding:14px;border-radius:6px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;
  }
  .btn-confirm{
    flex:2;background:var(--rojo);color:var(--txt);border:none;
    padding:14px;border-radius:6px;cursor:pointer;
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:3px;font-weight:700;
    box-shadow:0 0 20px rgba(139,0,0,.4);
  }
  .btn-confirm.blue{background:#1e3a5f;color:var(--azul);border:1px solid var(--azul);box-shadow:none}
  .form-group{margin-bottom:12px}
  .form-group label{font-size:11px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:6px}
  .form-group input,.form-group select{
    width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--txt);
    padding:12px 14px;border-radius:6px;font-family:inherit;font-size:16px;outline:none;
  }
  .empty{text-align:center;padding:60px 20px;color:var(--txt3);font-size:18px}

  /* TOAST */
  #toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--bg3);border:1px solid var(--border);border-left:4px solid var(--verde);
    color:var(--txt);padding:12px 20px;border-radius:8px;
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;
    opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="header">
  <div class="logo">🏉</div>
  <div class="brand">
    <div class="brand-name">Club Inventario</div>
    <div class="brand-sub">Stock & Ventas</div>
  </div>
  <nav id="nav">
    <button class="active" onclick="setVista('inventario')">📦 Stock</button>
    <button onclick="setVista('ventas')">💰 Ventas</button>
  </nav>
</div>

<div id="stats"></div>

<div id="content"></div>

<button id="fab" onclick="abrirNuevo()" title="Nuevo producto">+</button>

<div id="overlay" onclick="cerrarModal(event)">
  <div id="modal"></div>
</div>

<div id="toast"></div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────────────────
const KEY = 'clubInventario_v2';
function cargarEstado() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch(e){}
  return {
    productos: [
      {id:1,nombre:"Café",categoria:"Bebidas",precio:500,stock:50},
      {id:2,nombre:"Café con leche",categoria:"Bebidas",precio:600,stock:50},
      {id:3,nombre:"Agua",categoria:"Bebidas",precio:300,stock:40},
      {id:4,nombre:"Gaseosa",categoria:"Bebidas",precio:400,stock:30},
      {id:5,nombre:"Alfajor",categoria:"Comidas",precio:450,stock:30},
      {id:6,nombre:"Muffin",categoria:"Comidas",precio:550,stock:20},
      {id:7,nombre:"Medialuna",categoria:"Comidas",precio:350,stock:25},
      {id:8,nombre:"Sándwich",categoria:"Comidas",precio:800,stock:15},
    ],
    ventas: []
  };
}
let estado = cargarEstado();
function guardar() { try { localStorage.setItem(KEY, JSON.stringify(estado)); } catch(e){} }

// ─── VISTAS ───────────────────────────────────────────────────────────────
let vista = 'inventario';
let filtroCategoria = 'Todas';
let busqueda = '';
const CATEGORIAS = ['Bebidas','Comidas','Dulces','Snacks','Otro'];

function setVista(v) {
  vista = v;
  document.querySelectorAll('#nav button').forEach((b,i) => b.classList.toggle('active', (i===0&&v==='inventario')||(i===1&&v==='ventas')));
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function stockColor(s) { return s===0?'#ef4444':s<=5?'#f97316':'#22c55e'; }
function stockLabel(s) { return s===0?'SIN STOCK':s<=5?'BAJO':'OK'; }

function renderStats() {
  const totalVentas = estado.ventas.reduce((s,v)=>s+v.total,0);
  const stockTotal = estado.productos.reduce((s,p)=>s+p.stock,0);
  const bajoStock = estado.productos.filter(p=>p.stock<=5).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat" style="border-left:4px solid #22c55e">
      <div class="stat-icon">💰</div>
      <div class="stat-val" style="color:#22c55e">$${totalVentas.toLocaleString('es-AR')}</div>
      <div class="stat-lbl">Recaudado</div>
    </div>
    <div class="stat" style="border-left:4px solid #3b82f6">
      <div class="stat-icon">📦</div>
      <div class="stat-val" style="color:#3b82f6">${stockTotal}</div>
      <div class="stat-lbl">En Stock</div>
    </div>
    <div class="stat" style="border-left:4px solid ${bajoStock>0?'#f97316':'#444'}">
      <div class="stat-icon">⚠️</div>
      <div class="stat-val" style="color:${bajoStock>0?'#f97316':'#666'}">${bajoStock}</div>
      <div class="stat-lbl">Bajo Stock</div>
    </div>
  `;
}

function renderInventario() {
  const filtrados = estado.productos.filter(p => {
    const mc = filtroCategoria==='Todas'||p.categoria===filtroCategoria;
    const mb = p.nombre.toLowerCase().includes(busqueda.toLowerCase());
    return mc && mb;
  });
  let html = `
    <div id="filtros">
      <input type="search" placeholder="🔍 Buscar..." value="${busqueda}" oninput="busqueda=this.value;renderInventario()" />
      <select onchange="filtroCategoria=this.value;renderInventario()">
        <option ${filtroCategoria==='Todas'?'selected':''}>Todas</option>
        ${CATEGORIAS.map(c=>`<option ${filtroCategoria===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
  `;
  if (filtrados.length === 0) {
    html += `<div class="empty">No se encontraron productos</div>`;
  } else {
    filtrados.forEach(p => {
      const sc = stockColor(p.stock);
      const sl = stockLabel(p.stock);
      html += `
        <div class="producto-card">
          <div class="card-top">
            <div>
              <div class="card-nombre">${p.nombre}</div>
              <div class="card-cat">${p.categoria}<span class="estado-pill" style="background:${sc}22;color:${sc}">${sl}</span></div>
            </div>
            <div class="stock-badge" style="color:${sc}">${p.stock}</div>
          </div>
          <div class="card-bottom">
            <div class="precio">$${p.precio.toLocaleString('es-AR')}</div>
            <div class="acc">
              <button class="btn-vender" ${p.stock===0?'disabled':''} onclick="abrirVenta(${p.id})">VENDER</button>
              <button class="btn-stock" onclick="abrirStock(${p.id})">+STOCK</button>
              <button class="btn-del" onclick="eliminar(${p.id})">✕</button>
            </div>
          </div>
        </div>
      `;
    });
  }
  document.getElementById('content').innerHTML = html;
}

function renderVentas() {
  const ventas = [...estado.ventas].reverse();
  let html = '';
  if (ventas.length === 0) {
    html = `<div class="empty" style="margin-top:32px">📋 Aún no hay ventas registradas</div>`;
  } else {
    // Calcular totales
    const totalRecaudado = estado.ventas.reduce((s,v) => s+v.total, 0);
    const totalUnidades = estado.ventas.reduce((s,v) => s+v.qty, 0);
    const totalTransacciones = estado.ventas.length;

    // Agrupar por producto para el ranking
    const porProducto = {};
    estado.ventas.forEach(v => {
      if (!porProducto[v.nombre]) porProducto[v.nombre] = {qty:0, total:0};
      porProducto[v.nombre].qty += v.qty;
      porProducto[v.nombre].total += v.total;
    });
    const ranking = Object.entries(porProducto).sort((a,b) => b[1].total - a[1].total);

    html += `
      <!-- RESUMEN TOTAL -->
      <div style="background:linear-gradient(135deg,#1a0505,#111);border:1px solid #3a0000;border-left:4px solid var(--rojo);border-radius:10px;padding:20px;margin-bottom:20px">
        <div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:3px;color:var(--rojo);text-transform:uppercase;margin-bottom:16px">📊 Resumen Total</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
          <div style="text-align:center">
            <div style="font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--verde)">$${totalRecaudado.toLocaleString('es-AR')}</div>
            <div style="font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Recaudado</div>
          </div>
          <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
            <div style="font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--azul)">${totalUnidades}</div>
            <div style="font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Unidades</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--naranja)">${totalTransacciones}</div>
            <div style="font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Ventas</div>
          </div>
        </div>
        <!-- RANKING -->
        <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">🏆 Más vendidos</div>
        ${ranking.slice(0,3).map((([nombre,data],i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="font-family:'Oswald',sans-serif;font-size:16px;color:${i===0?'#f59e0b':i===1?'#9ca3af':'#92400e'};width:20px">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
            <div style="flex:1;font-size:14px">${nombre}</div>
            <div style="font-size:12px;color:var(--txt3)">${data.qty} u.</div>
            <div style="font-family:'Oswald',sans-serif;font-size:15px;color:var(--verde)">$${data.total.toLocaleString('es-AR')}</div>
          </div>
        `)).join('')}
      </div>

      <!-- HISTORIAL -->
      <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">🧾 Historial</div>
    `;

    ventas.forEach(v => {
      html += `
        <div class="venta-item">
          <div class="venta-info">
            <div class="venta-nombre">${v.nombre} <span style="color:#666;font-size:13px">× ${v.qty}</span></div>
            <div class="venta-fecha">${v.fecha}</div>
          </div>
          <div class="venta-total">$${v.total.toLocaleString('es-AR')}</div>
        </div>
      `;
    });
  }
  document.getElementById('content').innerHTML = html;
}

function render() {
  renderStats();
  if (vista === 'inventario') renderInventario();
  else renderVentas();
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────
function eliminar(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  estado.productos = estado.productos.filter(p=>p.id!==id);
  guardar(); render();
}

// ─── MODALES ──────────────────────────────────────────────────────────────
let modalCtx = null;

function abrirVenta(id) {
  const p = estado.productos.find(x=>x.id===id);
  modalCtx = {tipo:'venta', p, qty:1};
  renderModal();
  document.getElementById('overlay').classList.add('open');
}

function abrirStock(id) {
  const p = estado.productos.find(x=>x.id===id);
  modalCtx = {tipo:'stock', p, qty:1};
  renderModal();
  document.getElementById('overlay').classList.add('open');
}

function abrirNuevo() {
  modalCtx = {tipo:'nuevo', nombre:'', categoria:'Indumentaria', precio:'', stock:''};
  renderModal();
  document.getElementById('overlay').classList.add('open');
}

function cerrarModal(e) {
  if (e.target.id === 'overlay') { modalCtx=null; document.getElementById('overlay').classList.remove('open'); }
}

function cerrarModalBtn() {
  modalCtx=null; document.getElementById('overlay').classList.remove('open');
}

function renderModal() {
  const m = modalCtx;
  const el = document.getElementById('modal');
  if (m.tipo === 'venta') {
    const total = m.p.precio * m.qty;
    el.innerHTML = `
      <h2>Registrar Venta</h2>
      <div class="sub">${m.p.nombre}</div>
      <div class="modal-row"><span>Precio unitario</span><strong style="color:#22c55e">$${m.p.precio.toLocaleString('es-AR')}</strong></div>
      <div class="modal-row"><span>Stock disponible</span><strong>${m.p.stock}</strong></div>
      <label class="modal-input-label">Cantidad</label>
      <input class="modal-input" type="number" id="mQty" min="1" max="${m.p.stock}" value="${m.qty}" inputmode="numeric"
        oninput="modalCtx.qty=Math.max(1,Math.min(${m.p.stock},parseInt(this.value)||1));renderModal()"/>
      <div class="modal-total">
        <span>Total de la venta</span>
        <strong style="color:#22c55e">$${total.toLocaleString('es-AR')}</strong>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="cerrarModalBtn()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarVenta()">CONFIRMAR VENTA</button>
      </div>
    `;
  } else if (m.tipo === 'stock') {
    el.innerHTML = `
      <h2>Reponer Stock</h2>
      <div class="sub">${m.p.nombre}</div>
      <div class="modal-row"><span>Stock actual</span><strong style="color:${stockColor(m.p.stock)}">${m.p.stock}</strong></div>
      <label class="modal-input-label">Unidades a agregar</label>
      <input class="modal-input" type="number" id="mQty" min="1" value="${m.qty}" inputmode="numeric"
        oninput="modalCtx.qty=Math.max(1,parseInt(this.value)||1);renderModal()"/>
      <div class="modal-total">
        <span>Nuevo stock total</span>
        <strong style="color:#3b82f6">${m.p.stock + m.qty}</strong>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="cerrarModalBtn()">Cancelar</button>
        <button class="btn-confirm blue" onclick="confirmarStock()">REPONER STOCK</button>
      </div>
    `;
  } else if (m.tipo === 'nuevo') {
    el.innerHTML = `
      <h2>Nuevo Producto</h2>
      <div class="sub" style="margin-bottom:16px">Completá los datos del producto</div>
      <div class="form-group"><label>Nombre del producto</label>
        <input type="text" placeholder="Ej: Buzo del Club" value="${m.nombre}" oninput="modalCtx.nombre=this.value"/></div>
      <div class="form-group"><label>Categoría</label>
        <select onchange="modalCtx.categoria=this.value">
          ${CATEGORIAS.map(c=>`<option ${m.categoria===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="form-group"><label>Precio ($)</label>
        <input type="number" placeholder="0" value="${m.precio}" inputmode="numeric" oninput="modalCtx.precio=this.value"/></div>
      <div class="form-group"><label>Stock inicial</label>
        <input type="number" placeholder="0" value="${m.stock}" inputmode="numeric" oninput="modalCtx.stock=this.value"/></div>
      <div class="modal-btns" style="margin-top:20px">
        <button class="btn-cancel" onclick="cerrarModalBtn()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarNuevo()">AGREGAR</button>
      </div>
    `;
  }
}

function confirmarVenta() {
  const {p, qty} = modalCtx;
  const prod = estado.productos.find(x=>x.id===p.id);
  if (!prod || qty < 1 || qty > prod.stock) return;
  prod.stock -= qty;
  estado.ventas.push({
    id: Date.now(), productoId: p.id, nombre: p.nombre,
    qty, total: p.precio * qty,
    fecha: new Date().toLocaleString('es-AR')
  });
  guardar();
  cerrarModalBtn();
  toast(`✅ Vendido: ${p.nombre} × ${qty}`);
  render();
}

function confirmarStock() {
  const {p, qty} = modalCtx;
  const prod = estado.productos.find(x=>x.id===p.id);
  if (!prod || qty < 1) return;
  prod.stock += qty;
  guardar();
  cerrarModalBtn();
  toast(`📦 Stock actualizado: ${prod.nombre} → ${prod.stock} unidades`);
  render();
}

function confirmarNuevo() {
  const {nombre, categoria, precio, stock} = modalCtx;
  if (!nombre.trim() || !precio || !stock) { toast('⚠️ Completá todos los campos'); return; }
  estado.productos.push({
    id: Date.now(), nombre: nombre.trim(), categoria,
    precio: parseFloat(precio), stock: parseInt(stock)
  });
  guardar();
  cerrarModalBtn();
  toast(`✅ Producto agregado: ${nombre}`);
  render();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ─── PWA ──────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ─── INIT ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
