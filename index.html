<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#003087"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>El Kiosko de la 2012</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --azul:#003087;--azul2:#0047CC;--azulclaro:#e8f0ff;
  --blanco:#ffffff;--blancof:#f4f7ff;--blancog:#e0e8f7;
  --verde:#16a34a;--rojo:#dc2626;--naranja:#ea580c;--amarillo:#d97706;
  --txt:#0a1628;--txt2:#334155;--txt3:#64748b;
  --border:#c5d4ed;--shadow:rgba(0,48,135,0.15);
}
html,body{min-height:100%;background:var(--blancof);color:var(--txt);font-family:'Lato',sans-serif;overflow-x:hidden}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--azul);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#loginScreen .logo-login{width:100px;height:100px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.4);margin-bottom:16px}
#loginScreen .logo-login img{width:100%;height:100%;object-fit:cover}
#loginScreen h1{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-transform:uppercase;text-align:center;margin-bottom:4px}
#loginScreen .sub-login{font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
#userSelect{width:100%;max-width:340px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:12px 16px;border-radius:10px;font-family:'Lato',sans-serif;font-size:16px;margin-bottom:16px;outline:none}
#userSelect option{background:var(--azul);color:#fff}
.pin-display{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:transparent;transition:background .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:300px}
.pin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;padding:18px;font-family:'Oswald',sans-serif;font-size:22px;cursor:pointer;transition:background .1s}
.pin-btn:active{background:rgba(255,255,255,0.3)}
.pin-btn.del{font-size:18px}
#loginError{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;min-height:20px}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:var(--azul);border-bottom:3px solid var(--azul2);box-shadow:0 4px 20px var(--shadow);padding:0 10px;display:flex;align-items:center;gap:8px;min-height:58px;overflow:hidden}
#header .logo{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 10px rgba(255,255,255,0.15)}
#header .logo img{width:100%;height:100%;object-fit:cover}
#header .brand{flex:1;min-width:0}
#header .brand-name{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header .brand-sub{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase}
#nav{display:flex;gap:0;overflow-x:auto;flex-shrink:1;scrollbar-width:none;-ms-overflow-style:none}
#nav::-webkit-scrollbar{display:none}
#nav button{padding:16px 12px;background:transparent;color:rgba(255,255,255,0.45);border:none;cursor:pointer;font-size:20px;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .2s;white-space:nowrap;line-height:1;flex-shrink:0}
#nav button.active{color:#fff;border-bottom-color:#7eb3ff}
.user-chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.12);border-radius:20px;padding:5px 8px;cursor:pointer;border:none;color:#fff;font-family:'Lato',sans-serif;font-size:11px;white-space:nowrap;flex-shrink:0}
.user-chip .avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* STATS */
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;max-width:700px;margin:0 auto}
.stat{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:14px 10px;box-shadow:0 2px 8px var(--shadow)}
.stat-icon{font-size:20px;margin-bottom:4px}
.stat-val{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* CONTENT */
#content{max-width:700px;margin:0 auto;padding:0 14px 100px}

/* FILTROS */
#filtros{display:flex;gap:8px;margin-bottom:14px;padding-top:8px;flex-wrap:wrap}
#filtros input,#filtros select{background:var(--blanco);border:1px solid var(--border);color:var(--txt);padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;flex:1;min-width:120px;box-shadow:0 1px 4px var(--shadow)}

/* FAB */
#fab{position:fixed;bottom:24px;right:24px;z-index:90;width:58px;height:58px;border-radius:50%;background:var(--azul);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(0,48,135,0.5);display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.92)}

/* CARDS */
.producto-card{background:var(--blanco);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px var(--shadow)}
.card-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.card-nombre{font-family:'Oswald',sans-serif;font-size:17px;letter-spacing:1px;flex:1;color:var(--txt)}
.card-cat{font-size:11px;color:var(--txt3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.stock-badge{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;min-width:42px;text-align:center}
.card-bottom{display:flex;gap:0;border-top:1px solid var(--border)}
.card-precio{flex:1;padding:10px 16px;font-family:'Oswald',sans-serif;font-size:16px;color:var(--verde);display:flex;align-items:center}
.btn-vender,.btn-stock,.btn-del{padding:10px 12px;border:none;cursor:pointer;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;transition:background .15s}
.btn-vender{background:var(--azul);color:#fff;border-left:1px solid rgba(0,0,0,.08)}
.btn-vender:disabled{background:#cbd5e1;color:#94a3b8}
.btn-stock{background:#dbeafe;color:var(--azul2);border-left:1px solid rgba(0,0,0,.06)}
.btn-del{background:#f8fafc;color:#94a3b8;border-left:1px solid var(--border)}
.estado-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;letter-spacing:2px;font-weight:700;font-family:'Oswald',sans-serif;margin-left:8px;vertical-align:middle}

/* VENTA RAPIDA */
.vr-item{display:flex;align-items:center;justify-content:space-between;background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px var(--shadow)}
.vr-nombre{font-family:'Oswald',sans-serif;font-size:16px}
.vr-precio{font-size:13px;color:var(--txt3)}
.vr-controls{display:flex;align-items:center;gap:8px}
.vr-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--blancof);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;color:var(--azul)}
.vr-qty{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;min-width:28px;text-align:center}
.vr-ticket{background:var(--blanco);border:2px solid var(--azul);border-radius:12px;padding:16px;margin-bottom:12px}
.vr-ticket-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--border);font-size:14px}
.vr-ticket-row:last-child{border:none;font-weight:700;font-family:'Oswald',sans-serif;font-size:18px;color:var(--azul);padding-top:10px}

/* VENTAS LIST */
.venta-item{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px var(--shadow)}
.venta-info{flex:1}
.venta-nombre{font-family:'Oswald',sans-serif;font-size:15px;color:var(--txt)}
.venta-fecha{font-size:12px;color:var(--txt3);margin-top:2px}
.venta-total{font-family:'Oswald',sans-serif;font-size:18px;color:var(--verde);font-weight:700}
.btn-edit-venta{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;color:var(--txt3);margin-left:4px}
.btn-del-venta{background:none;border:1px solid #fecaca;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;color:var(--rojo);margin-left:4px}

/* SECCION */
.sec-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;padding-top:4px}
.card-resumen{background:var(--blanco);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px var(--shadow)}
.card-resumen-title{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}

/* ACTIVIDAD */
.act-item{background:var(--blanco);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.act-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.act-info{flex:1}
.act-desc{font-size:14px;color:var(--txt)}
.act-meta{font-size:11px;color:var(--txt3);margin-top:2px}

/* ADMIN */
.user-card{background:var(--blanco);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px var(--shadow)}
.user-avatar-big{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1}
.user-nombre{font-family:'Oswald',sans-serif;font-size:17px}
.user-rol{font-size:12px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.rol-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-family:'Oswald',sans-serif;letter-spacing:1px}

/* GANANCIAS */
.ganancia-card{background:var(--blanco);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px var(--shadow)}
.ganancia-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--txt3);margin-top:4px}

/* CIERRE */
.cierre-card{background:linear-gradient(135deg,#f0f7ff,var(--blanco));border:2px solid var(--azul);border-radius:14px;padding:20px;margin-bottom:14px}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,10,40,0.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#modal{background:var(--blanco);border-top:4px solid var(--azul);border-radius:20px 20px 0 0;padding:26px 20px 36px;width:100%;max-width:480px;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal h2{font-family:'Oswald',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px;color:var(--azul)}
#modal .sub{color:var(--txt3);font-size:14px;margin-bottom:18px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.modal-row span{color:var(--txt2);font-size:15px}
.modal-row strong{font-family:'Oswald',sans-serif;font-size:16px}
.modal-input-label{font-size:11px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase;margin:14px 0 6px;display:block}
.modal-input{width:100%;background:var(--blancof);border:2px solid var(--border);color:var(--txt);padding:12px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;outline:none;text-align:center}
.modal-input:focus{border-color:var(--azul2)}
.modal-total{background:var(--azulclaro);border:1px solid var(--border);padding:12px 16px;border-radius:8px;margin:12px 0 18px;display:flex;justify-content:space-between;align-items:center}
.modal-total span{color:var(--txt2)}
.modal-total strong{font-family:'Oswald',sans-serif;font-size:22px}
.modal-btns{display:flex;gap:10px}
.btn-cancel{flex:1;background:var(--blancof);color:var(--txt3);border:1px solid var(--border);padding:14px;border-radius:8px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px}
.btn-confirm{flex:2;background:var(--azul);color:#fff;border:none;padding:14px;border-radius:8px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:3px;font-weight:700;box-shadow:0 4px 14px rgba(0,48,135,0.35)}
.btn-confirm.green{background:var(--verde);box-shadow:0 4px 14px rgba(22,163,74,0.3)}
.btn-confirm.red{background:var(--rojo);box-shadow:none}
.form-group{margin-bottom:12px}
.form-group label{font-size:11px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-group input,.form-group select{width:100%;background:var(--blancof);border:1px solid var(--border);color:var(--txt);padding:11px 14px;border-radius:8px;font-family:inherit;font-size:16px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--azul2)}
.empty{text-align:center;padding:60px 20px;color:var(--txt3);font-size:18px}
.pago-btn{flex:1;padding:12px;border-radius:8px;border:2px solid var(--border);background:var(--blancof);color:var(--txt3);font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.pago-btn.active-efe{border-color:var(--verde);background:rgba(22,163,74,0.1);color:var(--verde)}
.pago-btn.active-mp{border-color:var(--azul2);background:rgba(0,71,204,0.1);color:var(--azul2)}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--azul);border-radius:10px;color:#fff;padding:12px 20px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;box-shadow:0 4px 20px var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* TABS INTERNOS */
.tab-bar{display:flex;gap:0;background:var(--blancog);border-radius:10px;padding:4px;margin-bottom:16px}
.tab-bar button{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;color:var(--txt3);cursor:pointer;transition:all .2s}
.tab-bar button.active{background:var(--blanco);color:var(--azul);box-shadow:0 1px 4px var(--shadow)}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
const KEY = 'kiosko2012_v2';

const COLORES_ROL = {admin:'#003087', supervisor:'#0047CC', vendedor:'#16a34a'};
const ROL_LABEL = {admin:'Administrador', supervisor:'Supervisor', vendedor:'Vendedor'};

function cargarEstado() {
  try { const s = localStorage.getItem(KEY); if (s) return JSON.parse(s); } catch(e){}
  return {
    usuarios: [
      {id:1, nombre:'Admin', pin:'1234', rol:'admin', color:'#003087', activo:true}
    ],
    productos: [
      {id:1,nombre:'Café',categoria:'Bebidas',precio:500,costo:200,stock:50},
      {id:2,nombre:'Café con leche',categoria:'Bebidas',precio:600,costo:250,stock:50},
      {id:3,nombre:'Agua',categoria:'Bebidas',precio:300,costo:100,stock:40},
      {id:4,nombre:'Gaseosa',categoria:'Bebidas',precio:400,costo:200,stock:30},
      {id:5,nombre:'Alfajor',categoria:'Dulces',precio:450,costo:250,stock:30},
      {id:6,nombre:'Muffin',categoria:'Comidas',precio:550,costo:300,stock:20},
      {id:7,nombre:'Medialuna',categoria:'Comidas',precio:350,costo:150,stock:25},
      {id:8,nombre:'Sándwich',categoria:'Comidas',precio:800,costo:400,stock:15},
    ],
    ventas: [],
    cierres: [],
    actividad: []
  };
}

let estado = cargarEstado();
let usuarioActual = null;
let pinIngresado = '';
let usuarioSelId = null;
let vista = 'caja';
let subVista = 'ventas';
let filtroCategoria = 'Todas';
let busqueda = '';
let carritoVR = {};

const CATEGORIAS = ['Bebidas','Comidas','Dulces','Snacks','Otro'];

function guardar() { try { localStorage.setItem(KEY, JSON.stringify(estado)); } catch(e){} }
function fmtPeso(n) { return '$' + (n||0).toLocaleString('es-AR'); }
function stockColor(s) { return s===0?'#dc2626':s<=5?'#ea580c':'#16a34a'; }
function stockLabel(s) { return s===0?'SIN STOCK':s<=5?'BAJO':'OK'; }

function registrarActividad(accion, detalle) {
  if (!usuarioActual) return;
  estado.actividad.unshift({
    id: Date.now(),
    usuarioId: usuarioActual.id,
    usuarioNombre: usuarioActual.nombre,
    usuarioColor: usuarioActual.color,
    accion, detalle,
    fecha: new Date().toLocaleString('es-AR')
  });
  if (estado.actividad.length > 200) estado.actividad = estado.actividad.slice(0,200);
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function initLogin() {
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '<option value="">— Seleccioná tu usuario —</option>';
  estado.usuarios.filter(u=>u.activo).forEach(u => {
    const o = document.createElement('option');
    o.value = u.id; o.textContent = u.nombre + ' (' + ROL_LABEL[u.rol] + ')';
    sel.appendChild(o);
  });
}

function seleccionarUsuario(id) {
  usuarioSelId = id ? parseInt(id) : null;
  pinIngresado = '';
  actualizarDots();
  document.getElementById('loginError').textContent = '';
}

function pinPress(d) {
  if (!usuarioSelId) { document.getElementById('loginError').textContent = '⚠️ Seleccioná un usuario primero'; return; }
  if (pinIngresado.length >= 4) return;
  pinIngresado += d;
  actualizarDots();
  if (pinIngresado.length === 4) setTimeout(validarPin, 200);
}

function pinDel() {
  pinIngresado = pinIngresado.slice(0,-1);
  actualizarDots();
}

function actualizarDots() {
  for (let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinIngresado.length);
  }
}

function validarPin() {
  const user = estado.usuarios.find(u=>u.id===usuarioSelId&&u.activo);
  if (user && user.pin === pinIngresado) {
    usuarioActual = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('loginError').textContent = '❌ PIN incorrecto';
    pinIngresado = '';
    actualizarDots();
  }
}

function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  usuarioActual = null;
  pinIngresado = '';
  usuarioSelId = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginError').textContent = '';
  document.getElementById('userSelect').value = '';
  actualizarDots();
}

// ═══════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════
function initApp() {
  const puedeTodo = ['admin','supervisor'].includes(usuarioActual.rol);
  const esAdmin = usuarioActual.rol === 'admin';
  let navHTML = `<button onclick="setVista('caja')">🛒</button>
    <button onclick="setVista('stock')">📦</button>
    <button onclick="setVista('ventas')">💰</button>`;
  if (puedeTodo) navHTML += `<button onclick="setVista('ganancias')">📈</button>`;
  navHTML += `<button onclick="exportarExcel()">⬇️</button>`;
  if (esAdmin) navHTML += `<button onclick="setVista('admin')">⚙️</button>`;
  document.getElementById('nav').innerHTML = navHTML;

  // User chip
  const chip = document.getElementById('userChip');
  chip.innerHTML = `<div class="avatar" style="background:${usuarioActual.color}">${usuarioActual.nombre[0]}</div><span>${usuarioActual.nombre}</span>`;

  vista = 'caja';
  render();
}

function setVista(v) {
  // Permisos
  if (v==='ganancias' && usuarioActual.rol==='vendedor') { toast('⚠️ Sin permiso'); return; }
  if (v==='admin' && usuarioActual.rol!=='admin') { toast('⚠️ Solo el administrador'); return; }
  vista = v;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const idx = ['caja','stock','ventas','ganancias','export','admin'];
  // highlight active
  document.querySelectorAll('#nav button').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'"+v+"'")) b.classList.add('active');
  });
  render();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderStats() {
  const totalVentas = estado.ventas.reduce((s,v)=>s+v.total,0);
  const stockTotal = estado.productos.reduce((s,p)=>s+p.stock,0);
  const bajoStock = estado.productos.filter(p=>p.stock<=5).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat" style="border-left:4px solid var(--verde)">
      <div class="stat-icon">💰</div>
      <div class="stat-val" style="color:var(--verde)">${fmtPeso(totalVentas)}</div>
      <div class="stat-lbl">Recaudado</div>
    </div>
    <div class="stat" style="border-left:4px solid var(--azul)">
      <div class="stat-icon">📦</div>
      <div class="stat-val" style="color:var(--azul)">${stockTotal}</div>
      <div class="stat-lbl">En Stock</div>
    </div>
    <div class="stat" style="border-left:4px solid ${bajoStock>0?'#ea580c':'#cbd5e1'}">
      <div class="stat-icon">⚠️</div>
      <div class="stat-val" style="color:${bajoStock>0?'#ea580c':'#94a3b8'}">${bajoStock}</div>
      <div class="stat-lbl">Bajo Stock</div>
    </div>`;
}

function render() {
  renderStats();
  if (vista==='caja') renderCaja();
  else if (vista==='stock') renderStock();
  else if (vista==='ventas') renderVentas();
  else if (vista==='ganancias') renderGanancias();
  else if (vista==='admin') renderAdmin();
}

// ═══════════════════════════════════════════
// VENTA RÁPIDA (CAJA)
// ═══════════════════════════════════════════
function renderCaja() {
  const items = estado.productos.filter(p=>p.stock>0);
  const totalCarrito = Object.entries(carritoVR).reduce((s,[id,q])=>{
    const p=estado.productos.find(x=>x.id==id); return s+(p?p.precio*q:0);},0);
  const cantItems = Object.values(carritoVR).reduce((s,q)=>s+q,0);

  let html = `<div style="padding-top:8px">`;

  // Ticket si hay items
  if (cantItems > 0) {
    html += `<div class="vr-ticket">
      <div style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;color:var(--azul);text-transform:uppercase;margin-bottom:8px">🛒 Pedido actual</div>`;
    Object.entries(carritoVR).forEach(([id,qty]) => {
      if (!qty) return;
      const p = estado.productos.find(x=>x.id==id);
      if (!p) return;
      html += `<div class="vr-ticket-row"><span>${p.nombre} × ${qty}</span><span>${fmtPeso(p.precio*qty)}</span></div>`;
    });
    html += `<div class="vr-ticket-row"><span>TOTAL</span><span>${fmtPeso(totalCarrito)}</span></div></div>`;
    html += `<div style="display:flex;gap:8px;margin-bottom:14px">
      <button onclick="vrPagarEfe()" class="btn-confirm green" style="flex:1;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px">💵 COBRAR EFECTIVO</button>
      <button onclick="vrPagarMP()" class="btn-confirm" style="flex:1;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px">📱 COBRAR MP</button>
    </div>
    <div style="text-align:center;margin-bottom:14px"><button onclick="carritoVR={};render()" style="background:none;border:1px solid var(--border);color:var(--txt3);padding:8px 20px;border-radius:8px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px">✕ LIMPIAR PEDIDO</button></div>`;
  }

  html += `<div class="sec-title">Productos disponibles</div>`;
  items.forEach(p => {
    const qty = carritoVR[p.id]||0;
    html += `<div class="vr-item">
      <div><div class="vr-nombre">${p.nombre}</div><div class="vr-precio">${fmtPeso(p.precio)} · stock: ${p.stock}</div></div>
      <div class="vr-controls">
        <button class="vr-btn" onclick="vrMenos(${p.id})">−</button>
        <div class="vr-qty" style="color:${qty>0?'var(--azul)':'var(--txt3)'}">${qty}</div>
        <button class="vr-btn" style="background:var(--azul);border-color:var(--azul);color:#fff" onclick="vrMas(${p.id})">+</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function vrMas(id) {
  const p = estado.productos.find(x=>x.id===id);
  if (!p) return;
  const cur = carritoVR[id]||0;
  if (cur >= p.stock) { toast('⚠️ Sin más stock'); return; }
  carritoVR[id] = cur+1;
  render();
}
function vrMenos(id) {
  if (!carritoVR[id]) return;
  carritoVR[id]--;
  if (!carritoVR[id]) delete carritoVR[id];
  render();
}
function vrPagar(pago) {
  const items = Object.entries(carritoVR).filter(([,q])=>q>0);
  if (!items.length) return;
  const fecha = new Date().toLocaleString('es-AR');
  items.forEach(([id,qty]) => {
    const prod = estado.productos.find(x=>x.id==id);
    if (!prod) return;
    prod.stock -= qty;
    const v = {id:Date.now()+Math.random(),productoId:prod.id,nombre:prod.nombre,qty,total:prod.precio*qty,costo:prod.costo||0,pago,fecha,usuarioId:usuarioActual.id,usuarioNombre:usuarioActual.nombre};
    estado.ventas.push(v);
    registrarActividad('venta', `Vendió ${qty}× ${prod.nombre} por ${fmtPeso(prod.precio*qty)} (${pago==='mercadopago'?'MP':'Efectivo'})`);
  });
  guardar();
  const total = items.reduce((s,[id,q])=>{const p=estado.productos.find(x=>x.id==id);return s+(p?p.precio*q:0);},0);
  carritoVR = {};
  toast(`✅ Cobrado ${fmtPeso(total)} — ${pago==='mercadopago'?'📱 MP':'💵 Efectivo'}`);
  render();
}
function vrPagarEfe() { vrPagar('efectivo'); }
function vrPagarMP() { vrPagar('mercadopago'); }

function renderStock() {
  const puedeEditar = ['admin','supervisor'].includes(usuarioActual.rol);
  const filtrados = estado.productos.filter(p=>{
    const mc=filtroCategoria==='Todas'||p.categoria===filtroCategoria;
    const mb=p.nombre.toLowerCase().includes(busqueda.toLowerCase());
    return mc&&mb;
  });
  let html = `<div id="filtros">
    <input type="search" placeholder="🔍 Buscar..." value="${busqueda}" oninput="busqueda=this.value;renderStock()"/>
    <select onchange="filtroCategoria=this.value;renderStock()">
      <option ${filtroCategoria==='Todas'?'selected':''}>Todas</option>
      ${CATEGORIAS.map(c=>`<option ${filtroCategoria===c?'selected':''}>${c}</option>`).join('')}
    </select></div>`;
  if (!filtrados.length) html += '<div class="empty">No se encontraron productos</div>';
  filtrados.forEach(p=>{
    const sc=stockColor(p.stock),sl=stockLabel(p.stock);
    html+=`<div class="producto-card">
      <div class="card-top">
        <div style="flex:1"><div class="card-nombre">${p.nombre}</div>
          <div class="card-cat">${p.categoria}<span class="estado-pill" style="background:${sc}22;color:${sc}">${sl}</span></div>
        </div><div class="stock-badge" style="color:${sc}">${p.stock}</div>
      </div>
      <div class="card-bottom">
        <div class="card-precio">${fmtPeso(p.precio)}</div>
        <div class="acc">
          <button class="btn-vender" ${p.stock===0?'disabled':''} onclick="abrirVenta(${p.id})">VENDER</button>
          <button class="btn-stock" onclick="abrirStock(${p.id})">+STOCK</button>
          ${puedeEditar?`<button class="btn-del" onclick="editarProducto(${p.id})">✏️</button><button class="btn-del" onclick="eliminarProducto(${p.id})">✕</button>`:''}
        </div>
      </div></div>`;
  });
  document.getElementById('content').innerHTML = html;
}

function renderGanancias() {
  if (!estado.ventas.length) { document.getElementById('content').innerHTML='<div class="empty">📈 No hay ventas aún</div>'; return; }
  const totalVentas=estado.ventas.reduce((s,v)=>s+v.total,0);
  let totalCosto=0;
  estado.ventas.forEach(v=>{const prod=estado.productos.find(p=>p.id===v.productoId);const c=v.costo!==undefined?v.costo:(prod?(prod.costo||0):0);totalCosto+=c*v.qty;});
  const gananciaTotal=totalVentas-totalCosto;
  const margen=totalVentas>0?((gananciaTotal/totalVentas)*100).toFixed(1):0;
  const porProducto={};
  estado.ventas.forEach(v=>{const prod=estado.productos.find(p=>p.id===v.productoId);const c=v.costo!==undefined?v.costo:(prod?(prod.costo||0):0);if(!porProducto[v.nombre])porProducto[v.nombre]={ventas:0,costo:0,qty:0,ganancia:0};porProducto[v.nombre].ventas+=v.total;porProducto[v.nombre].costo+=c*v.qty;porProducto[v.nombre].qty+=v.qty;porProducto[v.nombre].ganancia+=v.total-c*v.qty;});
  const ranking=Object.entries(porProducto).sort((a,b)=>b[1].ganancia-a[1].ganancia);
  let html=`<div class="card-resumen" style="border-left:4px solid var(--verde);margin-top:8px">
    <div class="card-resumen-title" style="color:var(--verde)">📈 Resumen de Ganancias</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div style="background:rgba(22,163,74,0.08);border-radius:8px;padding:14px;border:1px solid rgba(22,163,74,0.2)">
        <div style="font-size:11px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase">Ventas</div>
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--azul);margin-top:4px">${fmtPeso(totalVentas)}</div></div>
      <div style="background:rgba(220,38,38,0.07);border-radius:8px;padding:14px;border:1px solid rgba(220,38,38,0.15)">
        <div style="font-size:11px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase">Costos</div>
        <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--rojo);margin-top:4px">${fmtPeso(totalCosto)}</div></div></div>
    <div style="background:${gananciaTotal>=0?'rgba(22,163,74,0.1)':'rgba(220,38,38,0.08)'};border-radius:10px;padding:16px;border:2px solid ${gananciaTotal>=0?'var(--verde)':'var(--rojo)'};display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase">Ganancia neta</div>
      <div style="font-size:12px;color:var(--txt3);margin-top:2px">Margen: ${margen}%</div></div>
      <div style="font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:${gananciaTotal>=0?'var(--verde)':'var(--rojo)'}">${fmtPeso(gananciaTotal)}</div></div></div>
  <div class="sec-title">Por producto</div>`;
  ranking.forEach(([nombre,data])=>{
    const mp=data.ventas>0?((data.ganancia/data.ventas)*100).toFixed(0):0;
    const pct=gananciaTotal>0?(data.ganancia/gananciaTotal*100):0;
    html+=`<div class="ganancia-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:'Oswald',sans-serif;font-size:16px">${nombre}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:${data.ganancia>=0?'var(--verde)':'var(--rojo)'}">${fmtPeso(data.ganancia)}</div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--txt3);margin-top:4px">
        <span>Vendido: ${fmtPeso(data.ventas)} · Costo: ${fmtPeso(data.costo)} · ${data.qty} u.</span>
        <span style="color:${data.ganancia>=0?'var(--verde)':'var(--rojo)'};font-weight:700">${mp}%</span></div>
      <div style="margin-top:8px;height:5px;background:var(--blancog);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,Math.max(0,pct))}%;background:${data.ganancia>=0?'var(--verde)':'var(--rojo)'};border-radius:3px"></div></div></div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function eliminarProducto(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  const p=estado.productos.find(x=>x.id===id);
  registrarActividad('borró producto', `Eliminó "${p?p.nombre:'producto'}"`);
  estado.productos=estado.productos.filter(p=>p.id!==id);
  guardar(); render();
}
function eliminarVenta(id) {
  if (!confirm('¿Eliminar esta venta?')) return;
  const v=estado.ventas.find(x=>x.id===id);
  registrarActividad('borró venta', `Eliminó venta de ${v?v.nombre:''} por ${v?fmtPeso(v.total):''}`);
  estado.ventas=estado.ventas.filter(v=>v.id!==id);
  guardar(); render();
}
function toggleUsuario(id) {
  const u=estado.usuarios.find(x=>x.id===id);
  if (!u) return;
  u.activo=!u.activo;
  registrarActividad('modificó usuario', `${u.activo?'Activó':'Desactivó'} al usuario ${u.nombre}`);
  guardar(); render();
}
function abrirFab() {
  if (vista==='stock') abrirNuevo();
  else if (vista==='ventas') abrirNuevaVenta();
  else if (vista==='caja') { carritoVR={}; render(); }
  else if (vista==='admin') abrirNuevoUsuario();
}

function confirmarVenta() {
  const {p,qty,pago}=modalCtx;
  const prod=estado.productos.find(x=>x.id===p.id);
  if (!prod||qty<1||qty>prod.stock) return;
  prod.stock-=qty;
  const v={id:Date.now(),productoId:p.id,nombre:p.nombre,qty,total:p.precio*qty,costo:prod.costo||0,pago:pago||'efectivo',fecha:new Date().toLocaleString('es-AR'),usuarioId:usuarioActual.id,usuarioNombre:usuarioActual.nombre};
  estado.ventas.push(v);
  registrarActividad('venta', `Vendió ${qty}× ${p.nombre} por ${fmtPeso(p.precio*qty)} (${pago==='mercadopago'?'MP':'Efectivo'})`);
  guardar(); cerrarModalBtn();
  toast(`✅ ${p.nombre} × ${qty} — ${pago==='mercadopago'?'📱 MP':'💵 Efectivo'}`);
  render();
}
function confirmarStock() {
  const {p,qty}=modalCtx;
  const prod=estado.productos.find(x=>x.id===p.id);
  if (!prod||qty<1) return;
  prod.stock+=qty;
  registrarActividad('repuso stock', `Agregó ${qty} unidades de ${prod.nombre} (total: ${prod.stock})`);
  guardar(); cerrarModalBtn();
  toast(`📦 ${prod.nombre} → ${prod.stock} unidades`);
  render();
}
function confirmarNuevo() {
  const {nombre,categoria,precio,costo,stock}=modalCtx;
  if (!nombre.trim()||!precio||!stock){toast('⚠️ Completá todos los campos');return;}
  const p={id:Date.now(),nombre:nombre.trim(),categoria,precio:parseFloat(precio),costo:parseFloat(costo)||0,stock:parseInt(stock)};
  estado.productos.push(p);
  registrarActividad('agregó producto', `Creó "${nombre}" — precio ${fmtPeso(parseFloat(precio))}, stock ${stock}`);
  guardar(); cerrarModalBtn();
  toast(`✅ Producto agregado: ${nombre}`);
  render();
}
function confirmarEditarProducto() {
  const {p,nombre,categoria,precio,costo,stock}=modalCtx;
  const prod=estado.productos.find(x=>x.id===p.id);
  if (!prod||!nombre.trim()||!precio){toast('⚠️ Completá los campos');return;}
  registrarActividad('editó producto', `Modificó "${prod.nombre}" → precio ${fmtPeso(parseFloat(precio))}, stock ${stock}`);
  prod.nombre=nombre.trim();prod.categoria=categoria;prod.precio=parseFloat(precio);prod.costo=parseFloat(costo)||0;prod.stock=parseInt(stock)||0;
  guardar(); cerrarModalBtn();
  toast('✅ Producto actualizado');
  render();
}
function confirmarNuevaVenta() {
  const {productoId,nombre,qty,precio,pago,fecha}=modalCtx;
  let nomFinal=nombre,precioFinal=parseFloat(precio)||0,costoFinal=0,prodId=null;
  if (productoId&&productoId!=='__manual__') {
    const prod=estado.productos.find(x=>x.id==productoId);
    if (prod){nomFinal=prod.nombre;precioFinal=prod.precio;costoFinal=prod.costo||0;prodId=prod.id;}
  }
  if (!nomFinal.trim()||!precioFinal||!qty){toast('⚠️ Completá todos los campos');return;}
  estado.ventas.push({id:Date.now(),productoId:prodId,nombre:nomFinal,qty,total:precioFinal*qty,costo:costoFinal,pago:pago||'efectivo',fecha:fecha||new Date().toLocaleString('es-AR'),usuarioId:usuarioActual.id,usuarioNombre:usuarioActual.nombre});
  registrarActividad('cargó venta manual', `Registró ${qty}× ${nomFinal} por ${fmtPeso(precioFinal*qty)}`);
  guardar(); cerrarModalBtn();
  toast(`✅ Venta agregada: ${nomFinal} × ${qty}`);
  render();
}
function confirmarEditarVenta() {
  const {v,qty,precio,pago,fecha}=modalCtx;
  const venta=estado.ventas.find(x=>x.id===v.id);
  if (!venta) return;
  registrarActividad('editó venta', `Modificó venta de ${venta.nombre}: ${qty} u. × ${fmtPeso(parseFloat(precio))}`);
  venta.qty=qty;venta.total=parseFloat(precio)*qty;venta.pago=pago;venta.fecha=fecha;
  guardar(); cerrarModalBtn();
  toast('✅ Venta actualizada');
  render();
}
function confirmarNuevoUsuario() {
  const {nombre,pin,rol,color}=modalCtx;
  if (!nombre.trim()||pin.length!==4){toast('⚠️ Nombre y PIN de 4 dígitos requeridos');return;}
  if (estado.usuarios.some(u=>u.pin===pin)){toast('⚠️ Ese PIN ya está en uso');return;}
  estado.usuarios.push({id:Date.now(),nombre:nombre.trim(),pin,rol,color,activo:true});
  registrarActividad('creó usuario', `Creó al usuario ${nombre} con rol ${ROL_LABEL[rol]}`);
  guardar(); cerrarModalBtn();
  toast(`✅ Usuario ${nombre} creado`);
  render();
}
function confirmarEditarUsuario() {
  const {u,nombre,pin,rol,color}=modalCtx;
  const user=estado.usuarios.find(x=>x.id===u.id);
  if (!user||!nombre.trim()||pin.length!==4){toast('⚠️ Nombre y PIN de 4 dígitos requeridos');return;}
  if (estado.usuarios.some(x=>x.pin===pin&&x.id!==u.id)){toast('⚠️ Ese PIN ya está en uso');return;}
  registrarActividad('editó usuario', `Modificó datos de ${user.nombre}`);
  user.nombre=nombre.trim();user.pin=pin;user.rol=rol;user.color=color;
  guardar(); cerrarModalBtn();
  toast('✅ Usuario actualizado');
  render();
}
function confirmarCierre() {
  const totalEfe=estado.ventas.filter(v=>v.pago!=='mercadopago').reduce((s,v)=>s+v.total,0);
  const totalMP=estado.ventas.filter(v=>v.pago==='mercadopago').reduce((s,v)=>s+v.total,0);
  estado.cierres.push({
    id:Date.now(), fecha:new Date().toLocaleString('es-AR'),
    usuarioId:usuarioActual.id, usuarioNombre:usuarioActual.nombre,
    totalEfectivo:totalEfe, totalMP, totalGeneral:totalEfe+totalMP,
    cantVentas:estado.ventas.length, ventas:[...estado.ventas]
  });
  registrarActividad('cierre de caja', `Realizó cierre de caja por ${fmtPeso(totalEfe+totalMP)}`);
  estado.ventas=[];
  guardar(); cerrarModalBtn();
  toast('📋 Caja cerrada correctamente');
  render();
}

function exportarExcel() {
  try {
    const wb=XLSX.utils.book_new();
    const fecha=new Date().toLocaleDateString('es-AR').replace(/\//g,'-');

    // Stock
    const stockData=[['Producto','Categoría','Precio Venta','Costo Compra','Stock','Valor Stock (venta)','Valor Stock (costo)']];
    estado.productos.forEach(p=>stockData.push([p.nombre,p.categoria,p.precio,p.costo||0,p.stock,p.precio*p.stock,(p.costo||0)*p.stock]));
    stockData.push([]);
    stockData.push(['TOTAL','','','',estado.productos.reduce((s,p)=>s+p.stock,0),estado.productos.reduce((s,p)=>s+p.precio*p.stock,0),estado.productos.reduce((s,p)=>s+(p.costo||0)*p.stock,0)]);
    const wsStock=XLSX.utils.aoa_to_sheet(stockData);
    wsStock['!cols']=[{wch:20},{wch:14},{wch:14},{wch:14},{wch:8},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,wsStock,'Stock');

    // Ventas
    const ventasData=[['Fecha','Producto','Cantidad','Precio Unit.','Total','Método de Pago','Operador']];
    [...estado.ventas].forEach(v=>ventasData.push([v.fecha,v.nombre,v.qty,v.total/v.qty,v.total,v.pago==='mercadopago'?'Mercado Pago':'Efectivo',v.usuarioNombre||'']));
    ventasData.push([]);
    const tEfe=estado.ventas.filter(v=>v.pago!=='mercadopago').reduce((s,v)=>s+v.total,0);
    const tMP=estado.ventas.filter(v=>v.pago==='mercadopago').reduce((s,v)=>s+v.total,0);
    ventasData.push(['TOTAL EFECTIVO','','','',tEfe,'','']);
    ventasData.push(['TOTAL MP','','','',tMP,'','']);
    ventasData.push(['TOTAL GENERAL','','','',tEfe+tMP,'','']);
    const wsVentas=XLSX.utils.aoa_to_sheet(ventasData);
    wsVentas['!cols']=[{wch:22},{wch:20},{wch:10},{wch:14},{wch:14},{wch:16},{wch:14}];
    XLSX.utils.book_append_sheet(wb,wsVentas,'Ventas');

    // Cierres
    if (estado.cierres.length) {
      const cierresData=[['Fecha','Efectivo','Mercado Pago','Total','Cant. Ventas','Operador']];
      estado.cierres.forEach(c=>cierresData.push([c.fecha,c.totalEfectivo,c.totalMP,c.totalGeneral,c.cantVentas,c.usuarioNombre]));
      const wsCierres=XLSX.utils.aoa_to_sheet(cierresData);
      wsCierres['!cols']=[{wch:22},{wch:14},{wch:14},{wch:14},{wch:12},{wch:16}];
      XLSX.utils.book_append_sheet(wb,wsCierres,'Cierres');
    }

    // Ganancias
    const porProd={};
    estado.ventas.forEach(v=>{const prod=estado.productos.find(p=>p.id===v.productoId);const c=v.costo!==undefined?v.costo:(prod?(prod.costo||0):0);if(!porProd[v.nombre])porProd[v.nombre]={ventas:0,costo:0,qty:0,ganancia:0};porProd[v.nombre].ventas+=v.total;porProd[v.nombre].costo+=c*v.qty;porProd[v.nombre].qty+=v.qty;porProd[v.nombre].ganancia+=v.total-c*v.qty;});
    const ganData=[['Producto','Unidades','Total Ventas','Costo Total','Ganancia Neta','Margen %']];
    Object.entries(porProd).sort((a,b)=>b[1].ganancia-a[1].ganancia).forEach(([n,d])=>ganData.push([n,d.qty,d.ventas,d.costo,d.ganancia,d.ventas>0?parseFloat(((d.ganancia/d.ventas)*100).toFixed(1)):0]));
    const wsGan=XLSX.utils.aoa_to_sheet(ganData);
    wsGan['!cols']=[{wch:20},{wch:10},{wch:14},{wch:14},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb,wsGan,'Ganancias');

    // Actividad
    const actData=[['Fecha','Usuario','Acción','Detalle']];
    estado.actividad.forEach(a=>actData.push([a.fecha,a.usuarioNombre,a.accion,a.detalle]));
    const wsAct=XLSX.utils.aoa_to_sheet(actData);
    wsAct['!cols']=[{wch:22},{wch:14},{wch:18},{wch:40}];
    XLSX.utils.book_append_sheet(wb,wsAct,'Actividad');

    XLSX.writeFile(wb,`kiosko2012_${fecha}.xlsx`);
    toast('📊 Excel descargado');
  } catch(e){toast('❌ Error al exportar');console.error(e);}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

initLogin();
</script>
